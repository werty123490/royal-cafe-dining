<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Royal Cafe &amp; Dining — Leave a Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:         #1A0D02;
  --gold-bright:  #3A200A;
  --card-bg:      #160A00;
  --amber:        #F0E2C8;
}

html, body {
  min-height: 100%;
  background: #D78A37;
  font-family: 'Jost', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 5%,  rgba(255,225,130,0.35) 0%, transparent 55%),
    radial-gradient(ellipse 60% 45% at 88% 92%,  rgba(50,15,0,0.50)    0%, transparent 50%),
    radial-gradient(ellipse 80% 60% at 50% 55%,  rgba(160,75,5,0.18)   0%, transparent 70%),
    radial-gradient(ellipse 45% 55% at 72% 18%,  rgba(255,200,80,0.22) 0%, transparent 45%);
  pointer-events: none;
}

#particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

.page {
  position: relative;
  z-index: 2;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(20px, 4vw, 40px) clamp(16px, 5vw, 24px) clamp(30px, 6vw, 50px);
}

.logo-block {
  opacity: 0;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.15s forwards;
  margin-bottom: clamp(4px, 1.5vw, 8px);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.logo-glow {
  position: absolute;
  inset: -50px;
  border-radius: 50%;
  background: radial-gradient(ellipse 60% 40% at 50% 40%, rgba(255,255,255,0.38) 0%, transparent 70%);
  animation: glowPulse 3.5s ease-in-out infinite;
  pointer-events: none;
}

.brand-logo-img {
  display: block;
  width: clamp(200px, 65vw, 420px);
  height: auto;
  position: relative;
  z-index: 1;
  margin-bottom: -2%;
  filter: drop-shadow(0 0 26px rgba(0,0,0,0.38));
}

.stars-block {
  opacity: 0;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.32s forwards;
  text-align: center;
  margin-bottom: clamp(14px, 3vw, 20px);
}

.stars {
  display: inline-flex;
  gap: 6px;
  margin-bottom: 7px;
}

.star {
  font-size: clamp(18px, 4.5vw, 22px);
  color: var(--gold);
  display: inline-block;
  animation: starPulse 2.8s ease-in-out infinite;
  filter: drop-shadow(0 0 3px rgba(0,0,0,0.45));
}
.star:nth-child(2) { animation-delay: 0.15s; }
.star:nth-child(3) { animation-delay: 0.30s; }
.star:nth-child(4) { animation-delay: 0.45s; }
.star:nth-child(5) { animation-delay: 0.60s; }

.stars-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(20,8,0,0.65);
}

.card-wrap {
  width: 100%;
  max-width: 460px;
  padding: 1.5px;
  border-radius: 16px;
  background: linear-gradient(90deg,
    #2e1608, #ffffff, #F5E4B0, #ffffff, #F5E4B0, #ffffff, #2e1608);
  background-size: 250% 100%;
  animation: borderFlow 5s linear infinite, fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.48s both;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.22),
    0 8px 30px rgba(0,0,0,0.50),
    0 24px 70px rgba(0,0,0,0.40),
    0 0 90px rgba(0,0,0,0.28);
}

.card {
  background: var(--card-bg);
  border-radius: 14.5px;
  padding: clamp(22px, 5vw, 30px) clamp(20px, 5vw, 28px) clamp(18px, 4vw, 24px);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.9) 50%, transparent 100%);
  opacity: 0.8;
}

.card-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.card-label-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,220,180,0.28));
}
.card-label-line.r { background: linear-gradient(90deg, rgba(240,220,180,0.28), transparent); }
.card-label-text {
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(240,220,180,0.50);
  white-space: nowrap;
}

.review-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(15.5px, 3.8vw, 17px);
  font-weight: 400;
  line-height: 1.85;
  color: #F0E2C8;
  min-height: 90px;
  word-break: break-word;
  transition: opacity 0.2s ease;
  letter-spacing: 0.01em;
}
.review-text.fade { opacity: 0; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: clamp(16px, 3.5vw, 22px) 0;
}
.div-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,220,180,0.22));
}
.div-line.r { background: linear-gradient(90deg, rgba(240,220,180,0.22), transparent); }
.div-gem {
  color: rgba(240,220,180,0.38);
  font-size: 9px;
  line-height: 1;
}

.btn-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.btn-cta {
  flex: 1;
  min-height: 52px;
  padding: 0 18px;
  background: linear-gradient(135deg, #7a4e0c 0%, #C6841A 40%, #DE9E28 60%, #A86E14 100%);
  background-size: 200% 200%;
  color: #180E00;
  font-family: 'Jost', sans-serif;
  font-size: clamp(12px, 3vw, 13.5px);
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.4s ease;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.22) inset,
    0 -2px 0 rgba(0,0,0,0.28) inset,
    0 4px 16px rgba(156,100,16,0.45),
    0 8px 32px rgba(156,100,16,0.22);
}

.btn-cta::after {
  content: '';
  position: absolute;
  top: 0; left: -120%;
  width: 70%; height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.28) 50%, transparent 100%);
  transform: skewX(-18deg);
  pointer-events: none;
}

.btn-cta:hover {
  transform: translateY(-2px);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.22) inset,
    0 -2px 0 rgba(0,0,0,0.28) inset,
    0 6px 24px rgba(156,100,16,0.60),
    0 12px 40px rgba(156,100,16,0.28);
  background-position: 100% 0;
}
.btn-cta:hover::after { animation: shimmerSweep 0.65s ease forwards; }
.btn-cta:active { transform: scale(0.97) translateY(0); }

.btn-cta.success {
  background: linear-gradient(135deg, #3d6b45 0%, #5a9464 100%);
  box-shadow: 0 2px 0 rgba(255,255,255,0.15) inset, 0 4px 16px rgba(61,107,69,0.4);
  color: #fff;
}

.btn-refresh {
  flex: 0 0 52px;
  height: 52px;
  background: rgba(198,132,26,0.07);
  color: rgba(198,132,26,0.80);
  border: 1px solid rgba(198,132,26,0.28);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.22s ease;
  backdrop-filter: blur(4px);
}
.btn-refresh:hover {
  background: rgba(198,132,26,0.16);
  border-color: rgba(198,132,26,0.55);
  color: var(--gold-bright);
  transform: translateY(-1px);
}
.btn-refresh:active { transform: scale(0.95); }
.btn-refresh svg { transition: transform 0.48s cubic-bezier(.4,2,.55,.9); }
.btn-refresh.spinning svg { transform: rotate(360deg); }

.bottom-strip {
  opacity: 0;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.65s forwards;
  text-align: center;
  margin-top: clamp(16px, 3.5vw, 22px);
}

.badge-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border: 1px solid rgba(198,132,26,0.28);
  border-radius: 3px;
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(198,132,26,0.62);
}
.badge-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
  animation: dotPulse 2s ease-in-out infinite;
}

.hint-text {
  margin-top: 12px;
  font-size: 11px;
  color: rgba(198,132,26,0.38);
  letter-spacing: 0.03em;
  min-height: 16px;
  transition: color 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.08); }
}
@keyframes starPulse {
  0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 4px rgba(198,132,26,0.50)); }
  50%       { transform: scale(1.1); filter: drop-shadow(0 0 11px rgba(198,132,26,0.95)); }
}
@keyframes borderFlow {
  0%   { background-position: 0% 0; }
  100% { background-position: 250% 0; }
}
@keyframes shimmerSweep {
  0%   { left: -120%; }
  100% { left: 160%; }
}
@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<canvas id="particles"></canvas>

<div class="page">

  <div class="logo-block">
    <div class="logo-glow"></div>
    <img src="logo.png" alt="Royal Cafe &amp; Dining" class="brand-logo-img">
  </div>

  <div class="stars-block">
    <div class="stars">
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
    </div>
    <div class="stars-label">Share your experience</div>
  </div>

  <div class="card-wrap">
    <div class="card">
      <div class="card-label">
        <div class="card-label-line"></div>
        <span class="card-label-text">Your Review</span>
        <div class="card-label-line r"></div>
      </div>
      <div class="review-text" id="reviewText">Loading your review&hellip;</div>
      <div class="divider">
        <div class="div-line"></div>
        <span class="div-gem">&#10070;</span>
        <div class="div-line r"></div>
      </div>
      <div class="btn-row">
        <button class="btn-cta" id="btnCopy" onclick="copyAndGo()">Copy &amp; Post on Google</button>
        <button class="btn-refresh" id="btnRefresh" onclick="refreshReview()" title="New review">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-strip">
    <div class="badge-row">
      <div class="badge"><span class="badge-dot"></span>Best Restaurant in Sigra, Varanasi</div>
    </div>
    <div class="hint-text" id="hint">Tap to copy your review, then paste it on Google.</div>
  </div>

</div>

<script>
var reviewLink = "https://search.google.com/local/writereview?placeid=ChIJOf3r53YtjjkRe2uU2oLFSnk";
var currentReview = "";

function displayReview(text, anim) {
  var el = document.getElementById("reviewText");
  currentReview = text;
  
  if (anim) {
    el.classList.add("fade");
    setTimeout(function() {
      el.textContent = text;
      el.classList.remove("fade");
    }, 180);
  } else {
    el.textContent = text;
  }
}

async function refreshReview() {
  var btn = document.getElementById("btnRefresh");
  var el = document.getElementById("reviewText");
  
  btn.classList.add("spinning");
  el.classList.add("fade");
  
  try {
    const response = await fetch('/api/getReview');
    const data = await response.json();
    
    setTimeout(function() {
      displayReview(data.review, false);
      el.classList.remove("fade");
    }, 180);
  } catch (error) {
    setTimeout(function() {
      displayReview("Network error. Please try again.", false);
      el.classList.remove("fade");
    }, 180);
  }

  setTimeout(function() { btn.classList.remove("spinning"); }, 440);
  
  var cb = document.getElementById("btnCopy");
  cb.textContent = "Copy & Post on Google";
  cb.classList.remove("success");
  document.getElementById("hint").textContent = "Tap to copy your review, then paste it on Google.";
}

function copyAndGo() {
  var btn = document.getElementById("btnCopy");
  function afterCopy() {
    btn.textContent = "Copied! Opening Google\u2026 \u2713";
    btn.classList.add("success");
    document.getElementById("hint").textContent = "Paste it in the review box on Google. \uD83E\uDEB5";
    setTimeout(function() { window.open(reviewLink, "_blank"); }, 900);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentReview).then(afterCopy).catch(fallback);
  } else { fallback(); }
  function fallback() {
    var ta = document.createElement("textarea");
    ta.value = currentReview;
    ta.setAttribute("readonly", "");
    ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;pointer-events:none;";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(ta);
    afterCopy();
  }
}

window.addEventListener("DOMContentLoaded", function() { refreshReview(); });

(function() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }
  window.addEventListener('resize', resize);
  resize();
  function Particle() { this.reset(true); }
  Particle.prototype.reset = function(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : H + 8;
    this.r  = Math.random() * 1.4 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = -(Math.random() * 0.35 + 0.1);
    this.life  = Math.random() * Math.PI;
    this.speed = 0.006 + Math.random() * 0.006;
  };
  var particles = [];
  for (var i = 0; i < 28; i++) { particles.push(new Particle()); }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life += p.speed;
      if (p.y < -12) { p.reset(false); continue; }
      var alpha = Math.sin(p.life) * 0.45;
      if (alpha < 0) { p.reset(false); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(198,132,26,' + alpha.toFixed(3) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
